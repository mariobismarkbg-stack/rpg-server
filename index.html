<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG PRO AVANZADO</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:10px; }

/* INVENTARIO */
#inventory {
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:grid;
grid-template-columns:repeat(8,50px);
gap:5px;
}

.slot {
width:50px;height:50px;
background:#222;
border:1px solid #555;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:12px;
}

/* MINIMAPA */
#minimap {
position:fixed;
top:10px;
right:10px;
border:2px solid white;
}

/* MENU PERSONAJE */
#menu {
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
display:none;
border:2px solid white;
}
</style>
</head>

<body>

<h2>🌍 RPG PRO AVANZADO</h2>

<canvas id="game" width="900" height="500"></canvas>
<canvas id="minimap" width="150" height="150"></canvas>

<div id="inventory"></div>

<div id="menu"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const mini = document.getElementById("minimap").getContext("2d");

const MAP = 5000;

// PLAYER
let player = {
x:2500,y:2500,
hp:100,maxHp:100,
mana:50,maxMana:50,
karma:0,
class:"neutral",
inv:{},
anim:0
};

// INPUT
let keys={},attack=false;

document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key===" ") attack=true;
});
document.addEventListener("keyup",e=>keys[e.key]=false);

// PROYECTILES
let projectiles=[];

// OBJETOS
let trees=[...Array(300)].map(()=>({x:Math.random()*MAP,y:Math.random()*MAP}));
let rocks=[...Array(150)].map(()=>({x:Math.random()*MAP,y:Math.random()*MAP}));

let lakes=[
{x:3000,y:3000,w:800,h:800},
{x:1000,y:2000,w:200,h:200}
];

// CIUDADES
let cities=[
{x:800,y:800,r:400},
{x:4000,y:4000,r:400}
];

// CAMINOS
let roads=[
{x1:800,y1:800,x2:4000,y2:4000}
];

// NPC
let npcs=[...Array(30)].map(()=>({
x:800+Math.random()*200,
y:800+Math.random()*200
}));

// ENEMIGOS (lobos y osos)
let enemies=[...Array(60)].map(()=>({
x:Math.random()*MAP,
y:Math.random()*MAP,
hp:50,
type:Math.random()>0.5?"wolf":"bear"
}));

// COLISION
function collide(x,y){
for(let t of trees){
if(Math.hypot(x-t.x,y-t.y)<15) return true;
}
for(let r of rocks){
if(Math.hypot(x-r.x,y-r.y)<30) return true;
}
for(let l of lakes){
if(x>l.x && x<l.x+l.w && y>l.y && y<l.y+l.h) return true;
}
return false;
}

// CIUDAD CHECK
function inCity(x,y){
return cities.some(c=>Math.hypot(x-c.x,y-c.y)<c.r);
}

// UPDATE
function update(){

let nx=player.x,ny=player.y;

if(keys["w"]) ny-=4;
if(keys["s"]) ny+=4;
if(keys["a"]) nx-=4;
if(keys["d"]) nx+=4;

if(!collide(nx,ny)){
player.x=nx;
player.y=ny;
player.anim+=0.3;
}

// CLASE
if(player.karma>20) player.class="paladin";
else if(player.karma<-20) player.class="oscuro";
else player.class="neutral";

// ATAQUE → dispara proyectil
if(attack){
projectiles.push({
x:player.x,
y:player.y,
dx:0,
dy:-6
});
attack=false;
}

// PROYECTILES
projectiles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

// daño
enemies.forEach(e=>{
if(Math.hypot(p.x-e.x,p.y-e.y)<20){
e.hp-=20;
p.hit=true;
}
});
});

projectiles = projectiles.filter(p=>!p.hit);

// ENEMIGOS
enemies.forEach(e=>{

// no entrar a ciudades
if(inCity(e.x,e.y)) return;

let dx=player.x-e.x;
let dy=player.y-e.y;
let d=Math.hypot(dx,dy);

if(d<200){
let speed = e.type==="wolf"?2:1;
e.x+=dx/d*speed;
e.y+=dy/d*speed;
}

if(d<25){
player.hp-= e.type==="bear"?0.3:0.1;
}
});

// MUERTE
enemies=enemies.filter(e=>{
if(e.hp<=0){
player.inv["🦴"]=(player.inv["🦴"]||0)+1;
return false;
}
return true;
});
}

// PERSONAJE DETALLADO
function drawChar(x,y,color){

let off=Math.sin(player.anim)*3;

ctx.fillStyle=color;

// cuerpo
ctx.fillRect(x,y+off,16,20);

// cabeza
ctx.fillStyle="#ffcc99";
ctx.fillRect(x+4,y-8+off,8,8);

// piernas
ctx.fillStyle="white";
ctx.fillRect(x+2,y+20+Math.sin(player.anim)*3,4,6);
ctx.fillRect(x+10,y+20-Math.sin(player.anim)*3,4,6);
}

// MONSTRUOS
function drawMonster(e,x,y){
if(e.type==="wolf"){
ctx.fillStyle="gray";
ctx.fillRect(x,y,18,10);
}
else{
ctx.fillStyle="brown";
ctx.fillRect(x,y,22,14);
}
}

// DRAW
function draw(){

ctx.clearRect(0,0,900,500);

// fondo
ctx.fillStyle="#2e8b57";
ctx.fillRect(0,0,900,500);

// CAMINOS
ctx.strokeStyle="#c2b280";
ctx.lineWidth=6;
roads.forEach(r=>{
ctx.beginPath();
ctx.moveTo(r.x1-player.x+450,r.y1-player.y+250);
ctx.lineTo(r.x2-player.x+450,r.y2-player.y+250);
ctx.stroke();
});

// CIUDADES
cities.forEach(c=>{
ctx.fillStyle="rgba(0,255,255,0.2)";
ctx.beginPath();
ctx.arc(c.x-player.x+450,c.y-player.y+250,c.r,0,Math.PI*2);
ctx.fill();

// muralla
ctx.strokeStyle="#555";
ctx.strokeRect(
c.x-player.x+450-c.r/2,
c.y-player.y+250-c.r/2,
c.r,c.r
);
});

// LAGOS
lakes.forEach(l=>{
ctx.fillStyle="blue";
ctx.fillRect(l.x-player.x+450,l.y-player.y+250,l.w,l.h);
});

// ÁRBOLES
trees.forEach(t=>{
ctx.fillStyle="green";
ctx.fillRect(t.x-player.x+450,t.y-player.y+250,10,10);
});

// ROCAS
rocks.forEach(r=>{
ctx.fillStyle="gray";
ctx.fillRect(r.x-player.x+450,r.y-player.y+250,12,12);
});

// NPC
npcs.forEach(n=>{
drawChar(n.x-player.x+450,n.y-player.y+250,"yellow");
});

// ENEMIGOS
enemies.forEach(e=>{
drawMonster(e,e.x-player.x+450,e.y-player.y+250);

// HP
ctx.fillStyle="red";
ctx.fillRect(e.x-player.x+450,e.y-player.y+240,20,3);
ctx.fillStyle="lime";
ctx.fillRect(e.x-player.x+450,e.y-player.y+240,(e.hp/50)*20,3);
});

// PROYECTILES
projectiles.forEach(p=>{
ctx.fillStyle="orange";
ctx.fillRect(p.x-player.x+450,p.y-player.y+250,4,4);
});

// PLAYER
let color="cyan";
if(player.class==="paladin") color="gold";
if(player.class==="oscuro") color="purple";

drawChar(450,250,color);

// UI
ctx.fillStyle="red";
ctx.fillRect(20,20,200,10);
ctx.fillStyle="lime";
ctx.fillRect(20,20,(player.hp/player.maxHp)*200,10);
}

// LOOP
function loop(){
update();
draw();
drawInv();
drawMini();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
