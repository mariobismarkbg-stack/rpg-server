<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG Online PRO</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:20px; }

#inventory {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: grid;
    grid-template-columns: repeat(5, 50px);
    gap: 5px;
}

.slot {
    width: 50px;
    height: 50px;
    background: #222;
    border: 2px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-direction: column;
}
</style>
</head>

<body>

<h1>🌍 RPG Online PRO</h1>
<p id="status">Conectando...</p>
<p id="info"></p>

<canvas id="game" width="600" height="400"></canvas>
<div id="inventory"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let ws;
let players = {};
let myKarma = 0;

function conectar() {
    ws = new WebSocket("wss://rpg-server-01lz.onrender.com/");

    ws.onopen = () => {
        document.getElementById("status").innerText = "🟢 Conectado";
    };

    ws.onclose = () => {
        document.getElementById("status").innerText = "Reconectando...";
        setTimeout(conectar, 2000);
    };

    ws.onmessage = (e) => {
        try {
            players = JSON.parse(e.data);

            for (let id in players) {
                let p = players[id];
                let dx = p.x - player.x;
                let dy = p.y - player.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 5) {
                    myKarma = p.karma || 0;
                    break;
                }
            }
        } catch {}
    };
}
conectar();

// jugador
let player = {
    x: 1000,
    y: 1000,
    speed: 4,
    hp: 100,
    class: "guerrero",
    inventory: []
};

let animFrame = 0;
let moving = false;
let attack = false;
let attackAnim = 0;

// enemigos con movimiento
let enemies = [];
for (let i = 0; i < 10; i++) {
    enemies.push({
        x: Math.random()*2000,
        y: Math.random()*2000,
        hp: 50,
        dirX: (Math.random()-0.5)*2,
        dirY: (Math.random()-0.5)*2
    });
}

// mundo
let trees = [];
let rocks = [];
let waterZones = [];

for (let i = 0; i < 50; i++) {
    trees.push({ x: Math.random()*2000, y: Math.random()*2000 });
}

for (let i = 0; i < 40; i++) {
    rocks.push({ x: Math.random()*2000, y: Math.random()*2000 });
}

for (let i = 0; i < 3; i++) {
    waterZones.push({
        x: Math.random()*1800,
        y: Math.random()*1800,
        w: 200,
        h: 200
    });
}

// cámara
let camera = { x: 0, y: 0 };

// controles
let keys = {};
document.addEventListener("keydown", (e) => {
    keys[e.key] = true;
    if (e.key === " ") {
        attack = true;
        attackAnim = 10;
    }
});
document.addEventListener("keyup", (e) => {
    keys[e.key] = false;
});

// update
function update() {

    moving = false;

    if (keys["w"]) { player.y -= player.speed; moving = true; }
    if (keys["s"]) { player.y += player.speed; moving = true; }
    if (keys["a"]) { player.x -= player.speed; moving = true; }
    if (keys["d"]) { player.x += player.speed; moving = true; }

    // anim caminar
    if (moving) animFrame += 0.2;
    else animFrame = 0;

    // anim ataque
    if (attackAnim > 0) attackAnim--;

    // enemigos se mueven
    enemies.forEach(e => {
        e.x += e.dirX;
        e.y += e.dirY;

        if (Math.random() < 0.01) {
            e.dirX = (Math.random()-0.5)*2;
            e.dirY = (Math.random()-0.5)*2;
        }
    });

    // combate
    if (attack) {
        enemies.forEach(e => {
            let dx = e.x - player.x;
            let dy = e.y - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 60) {
                e.hp -= 10;

                if (e.hp <= 0) {
                    e.hp = 50;
                    e.x = Math.random()*2000;
                    e.y = Math.random()*2000;

                    const drops = ["🪵","🪨","💎","🧪"];
                    player.inventory.push(drops[Math.floor(Math.random()*drops.length)]);
                }
            }
        });
    }

    // enviar server
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            x: player.x,
            y: player.y,
            attack: attack
        }));
    }

    attack = false;

    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;
}

// inventario
function drawInventory() {
    const inv = document.getElementById("inventory");
    inv.innerHTML = "";

    let counts = {};
    player.inventory.forEach(item => {
        counts[item] = (counts[item] || 0) + 1;
    });

    let items = Object.keys(counts);

    for (let i = 0; i < 10; i++) {
        let slot = document.createElement("div");
        slot.className = "slot";

        if (items[i]) {
            slot.innerHTML = `<div>${items[i]}</div><div style="font-size:10px;">x${counts[items[i]]}</div>`;
        }

        inv.appendChild(slot);
    }
}

// draw
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#2e8b57";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // agua
    waterZones.forEach(w => {
        ctx.fillStyle = "rgba(0,100,255,0.5)";
        ctx.fillRect(w.x - camera.x, w.y - camera.y, w.w, w.h);
    });

    // árboles
    trees.forEach(t => {
        ctx.fillStyle = "darkgreen";
        ctx.fillRect(t.x - camera.x, t.y - camera.y, 30, 30);
    });

    // rocas
    rocks.forEach(r => {
        ctx.fillStyle = "gray";
        ctx.fillRect(r.x - camera.x, r.y - camera.y, 25, 25);
    });

    // enemigos
    enemies.forEach(e => {
        ctx.fillStyle = "purple";
        ctx.fillRect(e.x - camera.x, e.y - camera.y, 20, 20);

        ctx.fillStyle = "red";
        ctx.fillRect(e.x - camera.x, e.y - camera.y - 10, e.hp, 4);
    });

    // jugador
    let offset = Math.sin(animFrame) * 5;

    ctx.fillStyle = "blue";

    ctx.fillRect(player.x - camera.x, player.y - camera.y + offset, 20, 20);

    ctx.fillRect(player.x - camera.x + 2, player.y - camera.y + 20 + Math.sin(animFrame)*5, 5, 10);
    ctx.fillRect(player.x - camera.x + 12, player.y - camera.y + 20 - Math.sin(animFrame)*5, 5, 10);

    // ataque visual
    if (attackAnim > 0) {
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(player.x - camera.x + 10, player.y - camera.y + 10, 30, 0, Math.PI*2);
        ctx.fill();
    }

    document.getElementById("info").innerText =
        "Inventario: " + player.inventory.length;
}

// loop
function loop() {
    update();
    draw();
    drawInventory();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
