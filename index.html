<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG WORLD FINAL</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:20px; }

#minimap { position:fixed; top:10px; right:10px; border:2px solid white; }
#worldmap { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); display:none; border:2px solid white; }

#inventory {
position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
display:grid; grid-template-columns:repeat(8,50px); gap:5px;
}

.slot {
width:50px;height:50px;background:#222;border:1px solid #555;
display:flex;flex-direction:column;align-items:center;justify-content:center;
cursor:pointer;
}
</style>
</head>

<body>

<h2>🌍 RPG WORLD FINAL</h2>

<canvas id="game" width="800" height="500"></canvas>
<canvas id="minimap" width="150" height="150"></canvas>
<canvas id="worldmap" width="400" height="400"></canvas>

<div id="inventory"></div>

<script>
const W=4000,H=4000;
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const mini=document.getElementById("minimap");
const mtx=mini.getContext("2d");

const worldmap=document.getElementById("worldmap");
const wtx=worldmap.getContext("2d");

// jugador
let player={
x:2000,y:2000,
hp:100,mana:100,
karma:0,
inventory:{},
anim:0
};

// clases
function getClass(){
if(player.karma>20) return "paladin";
if(player.karma<-20) return "oscuro";
return "neutral";
}

// ciudades grandes
let cities=[
{x:800,y:800,r:400},
{x:3000,y:700,r:400}
];

// pueblos
let towns=[
{x:1000,y:3000,r:200},
{x:3200,y:2800,r:200}
];

// zonas peligrosas
let dangerZones=[
{x:2000,y:2000,r:600},
{x:3500,y:1500,r:500}
];

// bosques (GRUPOS)
let trees=[];
for(let i=0;i<30;i++){
let cx=Math.random()*W, cy=Math.random()*H;
for(let j=0;j<20;j++){
trees.push({x:cx+Math.random()*200,y:cy+Math.random()*200,hp:30});
}
}

// montañas grandes
let mountains=[];
for(let i=0;i<20;i++){
mountains.push({x:Math.random()*W,y:Math.random()*H});
}

// lagos
let lakes=[
{x:2800,y:0,w:1000,h:1000},
{x:500,y:2000,w:200,h:200},
{x:2000,y:3500,w:200,h:200}
];

// NPC
let npcs=[];
cities.forEach(c=>{
for(let i=0;i<20;i++){
npcs.push({
x:c.x+(Math.random()-0.5)*c.r,
y:c.y+(Math.random()-0.5)*c.r,
home:c
});
}
});

// enemigos
let enemies=[];
function spawn(type,x,y){
enemies.push({
x,y,
hp:type==="boss"?200:type==="elite"?100:50,
type
});
}

// spawn masivo
for(let i=0;i<120;i++){
spawn("normal",Math.random()*W,Math.random()*H);
}

// controles
let keys={},attack=false;
document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key===" ") attack=true;
if(e.key==="m"){
worldmap.style.display=
worldmap.style.display==="none"?"block":"none";
}
});
document.addEventListener("keyup",e=>keys[e.key]=false);

// update
function update(){

let nx=player.x, ny=player.y;

// movimiento
if(keys["w"]) ny-=4;
if(keys["s"]) ny+=4;
if(keys["a"]) nx-=4;
if(keys["d"]) nx+=4;

// colisión montañas
let blocked=false;
mountains.forEach(m=>{
if(Math.hypot(nx-m.x,ny-m.y)<80) blocked=true;
});

if(!blocked){
player.x=nx;player.y=ny;
}

// animación caminar
if(keys["w"]||keys["s"]||keys["a"]||keys["d"]){
player.anim+=0.3;
}

// NPC movimiento dentro ciudad
npcs.forEach(n=>{
let dx=n.home.x-n.x;
let dy=n.home.y-n.y;

n.x+=Math.sign(dx)*0.3 + (Math.random()-0.5);
n.y+=Math.sign(dy)*0.3 + (Math.random()-0.5);
});

// enemigos
enemies.forEach(e=>{

// no entrar ciudades
let inCity=cities.some(c=>Math.hypot(e.x-c.x,e.y-c.y)<c.r);
if(inCity) return;

let dx=player.x-e.x;
let dy=player.y-e.y;
let dist=Math.hypot(dx,dy);

if(dist<250){
e.x+=dx/dist;
e.y+=dy/dist;
}

if(dist<30) player.hp-=0.2;
});

// ataque
if(attack){
enemies.forEach(e=>{
if(Math.hypot(e.x-player.x,e.y-player.y)<70){
e.hp-=10;
}
});
attack=false;
}

// eliminar muertos
enemies=enemies.filter(e=>e.hp>0);
}

// draw personaje
function drawPlayer(x,y){

let offset=Math.sin(player.anim)*5;

// cuerpo
ctx.fillStyle="cyan";
ctx.fillRect(x,y+offset,20,20);

// cabeza
ctx.fillStyle="#ffcc99";
ctx.fillRect(x+5,y-10+offset,10,10);

// piernas
ctx.fillStyle="white";
ctx.fillRect(x+2,y+20+Math.sin(player.anim)*5,5,10);
ctx.fillRect(x+12,y+20-Math.sin(player.anim)*5,5,10);
}

// draw npc
function drawNPC(n,x,y){
let offset=Math.sin(n.x)*2;

ctx.fillStyle="yellow";
ctx.fillRect(x,y+offset,15,15);

ctx.fillStyle="#ffcc99";
ctx.fillRect(x+3,y-8+offset,8,8);

ctx.fillStyle="white";
ctx.fillRect(x+2,y+15+Math.sin(offset)*3,4,8);
ctx.fillRect(x+9,y+15-Math.sin(offset)*3,4,8);
}

// draw
function draw(){

ctx.clearRect(0,0,800,500);

// fondo
ctx.fillStyle="#2e8b57";
ctx.fillRect(0,0,800,500);

// lagos
lakes.forEach(l=>{
ctx.fillStyle=l.w>500?"darkblue":"lightblue";
ctx.fillRect(l.x-player.x+400,l.y-player.y+250,l.w,l.h);
});

// montañas
mountains.forEach(m=>{
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(m.x-player.x+400,m.y-player.y+250,60,0,Math.PI*2);
ctx.fill();
});

// bosques
trees.forEach(t=>{
ctx.fillStyle="green";
ctx.fillRect(t.x-player.x+400,t.y-player.y+250,15,15);
});

// ciudades
cities.forEach(c=>{
ctx.strokeStyle="white";
ctx.lineWidth=3;
ctx.strokeRect(c.x-player.x+400-c.r/2,c.y-player.y+250-c.r/2,c.r,c.r);
});

// npc
npcs.forEach(n=>{
drawNPC(n,n.x-player.x+400,n.y-player.y+250);
});

// enemigos
enemies.forEach(e=>{
ctx.fillStyle=e.type==="elite"?"red":e.type==="boss"?"black":"purple";
ctx.fillRect(e.x-player.x+400,e.y-player.y+250,20,20);
});

// jugador
drawPlayer(400,250);

// minimapa
mtx.clearRect(0,0,150,150);

// jugador centro
mtx.fillStyle="blue";
mtx.fillRect(75,75,4,4);

// npc
mtx.fillStyle="green";
npcs.forEach(n=>{
mtx.fillRect((n.x-player.x)/20+75,(n.y-player.y)/20+75,2,2);
});

// enemigos
mtx.fillStyle="red";
enemies.forEach(e=>{
mtx.fillRect((e.x-player.x)/20+75,(e.y-player.y)/20+75,2,2);
});

// worldmap
wtx.clearRect(0,0,400,400);
wtx.fillStyle="blue";
wtx.fillRect(player.x/W*400,player.y/H*400,5,5);
}

// loop
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
