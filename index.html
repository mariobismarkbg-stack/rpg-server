<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG Online PRO</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:20px; }

#inventory {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: grid;
    grid-template-columns: repeat(5, 50px);
    gap: 5px;
}

.slot {
    width: 50px;
    height: 50px;
    background: #222;
    border: 2px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-direction: column;
}

#skills {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
}

.skill {
    width: 60px;
    height: 60px;
    background: #111;
    border: 2px solid #777;
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
</head>

<body>

<h1>🌍 RPG Online PRO</h1>
<p id="status">Jugando...</p>
<p id="info"></p>

<canvas id="game" width="600" height="400"></canvas>

<div id="skills">
    <div class="skill">Q ⚡</div>
    <div class="skill">E 💥</div>
</div>

<div id="inventory"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// jugador
let player = {
    x: 1000,
    y: 1000,
    speed: 4,
    hp: 100,
    maxHp: 100,
    inventory: []
};

// anim
let animFrame = 0;
let moving = false;
let attack = false;

// mundo
let trees=[], rocks=[], waterZones=[];

for(let i=0;i<100;i++){
    trees.push({x:Math.random()*2000,y:Math.random()*2000,hp:30,cut:false});
}

for(let i=0;i<60;i++){
    rocks.push({x:Math.random()*2000,y:Math.random()*2000});
}

for(let i=0;i<5;i++){
    waterZones.push({
        x:Math.random()*1500,
        y:Math.random()*1500,
        w:400,
        h:400,
        deep:true
    });
}

// enemigos con IA
let enemies=[];
for(let i=0;i<10;i++){
    enemies.push({
        x:Math.random()*2000,
        y:Math.random()*2000,
        hp:50,
        state:"idle",
        dirX:(Math.random()-0.5)*2,
        dirY:(Math.random()-0.5)*2,
        attackCooldown:0
    });
}

// cámara
let camera={x:0,y:0};

// controles
let keys={};
document.addEventListener("keydown",e=>{
    keys[e.key]=true;
    if(e.key===" ") attack=true;
});
document.addEventListener("keyup",e=>keys[e.key]=false);

// colisión
function collide(x,y,ox,oy,size){
    return x<ox+size && x+20>ox && y<oy+size && y+20>oy;
}

// update
function update(){

    let newX=player.x;
    let newY=player.y;
    moving=false;

    if(keys["w"]){newY-=player.speed; moving=true;}
    if(keys["s"]){newY+=player.speed; moving=true;}
    if(keys["a"]){newX-=player.speed; moving=true;}
    if(keys["d"]){newX+=player.speed; moving=true;}

    let blocked=false;

    trees.forEach(t=>{
        if(!t.cut && collide(newX,newY,t.x,t.y,30)) blocked=true;
    });

    rocks.forEach(r=>{
        if(collide(newX,newY,r.x,r.y,25)) blocked=true;
    });

    waterZones.forEach(w=>{
        if(newX<w.x+w.w && newX+20>w.x && newY<w.y+w.h && newY+20>w.y){
            blocked=true;
        }
    });

    if(!blocked){
        player.x=newX;
        player.y=newY;
    }

    if(moving) animFrame+=0.2;
    else animFrame=0;

    // 👾 IA enemigos
    enemies.forEach(e=>{

        let dx=player.x-e.x;
        let dy=player.y-e.y;
        let dist=Math.sqrt(dx*dx+dy*dy);

        // DETECCIÓN
        if(dist < 200){
            e.state="chase";
        } else if(dist > 250){
            e.state="idle";
        }

        // COMPORTAMIENTO
        if(e.state==="chase"){
            let angle=Math.atan2(dy,dx);
            e.x += Math.cos(angle)*1.5;
            e.y += Math.sin(angle)*1.5;
        } else {
            e.x += e.dirX;
            e.y += e.dirY;

            if(Math.random()<0.02){
                e.dirX=(Math.random()-0.5)*2;
                e.dirY=(Math.random()-0.5)*2;
            }
        }

        // ATAQUE AL JUGADOR
        if(dist < 30 && e.attackCooldown <= 0){
            player.hp -= 5;
            e.attackCooldown = 30;
        }

        if(e.attackCooldown > 0) e.attackCooldown--;
    });

    // MUERTE
    if(player.hp <= 0){
        player.hp = player.maxHp;
        player.x = 1000;
        player.y = 1000;
        alert("💀 Has muerto!");
    }

    // ataque jugador
    if(attack){
        enemies.forEach(e=>{
            let dx=e.x-player.x;
            let dy=e.y-player.y;
            let dist=Math.sqrt(dx*dx+dy*dy);

            if(dist < 60){
                e.hp -= 10;

                if(e.hp <= 0){
                    e.hp=50;
                    e.x=Math.random()*2000;
                    e.y=Math.random()*2000;

                    const drops=["🪵","🪨","💎","🧪"];
                    player.inventory.push(drops[Math.floor(Math.random()*4)]);
                }
            }
        });
    }

    attack=false;

    camera.x=player.x-canvas.width/2;
    camera.y=player.y-canvas.height/2;
}

// inventario
function drawInventory(){
    const inv=document.getElementById("inventory");
    inv.innerHTML="";

    let counts={};
    player.inventory.forEach(i=>counts[i]=(counts[i]||0)+1);
    let items=Object.keys(counts);

    for(let i=0;i<10;i++){
        let s=document.createElement("div");
        s.className="slot";

        if(items[i]){
            s.innerHTML=`${items[i]}<br>x${counts[items[i]]}`;
        }

        inv.appendChild(s);
    }
}

// draw
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#2e8b57";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // agua
    waterZones.forEach(w=>{
        ctx.fillStyle="rgba(0,0,150,0.7)";
        ctx.fillRect(w.x-camera.x,w.y-camera.y,w.w,w.h);
    });

    // árboles
    trees.forEach(t=>{
        if(!t.cut){
            ctx.fillStyle="darkgreen";
            ctx.fillRect(t.x-camera.x,t.y-camera.y,30,30);
        } else {
            ctx.fillStyle="brown";
            ctx.fillRect(t.x-camera.x,t.y-camera.y,20,10);
        }
    });

    // rocas
    rocks.forEach(r=>{
        ctx.fillStyle="gray";
        ctx.fillRect(r.x-camera.x,r.y-camera.y,25,25);
    });

    // enemigos
    enemies.forEach(e=>{
        ctx.fillStyle="purple";
        ctx.fillRect(e.x-camera.x,e.y-camera.y,20,20);

        ctx.fillStyle="red";
        ctx.fillRect(e.x-camera.x,e.y-camera.y-8,e.hp,4);
    });

    // jugador
    ctx.fillStyle="blue";
    ctx.fillRect(player.x-camera.x,player.y-camera.y,20,20);

    // ❤️ barra vida jugador
    ctx.fillStyle="red";
    ctx.fillRect(20,20,200,10);

    ctx.fillStyle="lime";
    ctx.fillRect(20,20,(player.hp/player.maxHp)*200,10);

    document.getElementById("info").innerText =
        "HP: "+player.hp+" | Inventario: "+player.inventory.length;
}

// loop
function loop(){
    update();
    draw();
    drawInventory();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
