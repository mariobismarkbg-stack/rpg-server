<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG PRO+</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:20px; }

/* INVENTARIO */
#inventory {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: grid;
    grid-template-columns: repeat(5, 50px);
    gap: 5px;
}

.slot {
    width: 50px;
    height: 50px;
    background: #222;
    border: 2px solid #555;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    cursor:pointer;
}

/* MENU PERSONAJE */
#menu {
    position: fixed;
    top: 50px;
    right: 20px;
    background: #111;
    border: 2px solid #777;
    padding: 10px;
    display: none;
}
</style>
</head>

<body>

<h1>🌍 RPG PRO+</h1>
<p id="info"></p>

<canvas id="game" width="600" height="400"></canvas>

<div id="inventory"></div>

<div id="menu">
<h3>Personaje</h3>
<p id="stats"></p>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// jugador
let player = {
    x:1000,y:1000,
    speed:4,
    hp:100,maxHp:100,
    inventory:["🧪","🪵"],
    weapon:"ninguna"
};

let keys={}, attack=false, skillQ=false, skillE=false;
let animFrame=0, moving=false;

// zonas
const safeZone = { x:1000, y:1000, r:300 };
const dangerZone = { x:1500, y:1500, r:400 };

// enemigos
let enemies=[];
for(let i=0;i<10;i++){
    enemies.push({
        x:Math.random()*2000,
        y:Math.random()*2000,
        hp:50,
        cooldown:0
    });
}

// controles
document.addEventListener("keydown",e=>{
    keys[e.key]=true;
    if(e.key===" ") attack=true;
    if(e.key==="q") skillQ=true;
    if(e.key==="e") skillE=true;

    if(e.key==="i"){
        let m=document.getElementById("menu");
        m.style.display = m.style.display==="none"?"block":"none";
    }
});
document.addEventListener("keyup",e=>keys[e.key]=false);

// INVENTARIO CLICK
function useItem(item){
    if(item==="🧪"){
        player.hp = Math.min(player.hp+30, player.maxHp);
    }
}

// dibujar inventario
function drawInventory(){
    const inv=document.getElementById("inventory");
    inv.innerHTML="";

    player.inventory.forEach((item,i)=>{
        let s=document.createElement("div");
        s.className="slot";
        s.innerText=item;

        s.onclick=()=>{
            useItem(item);
            player.inventory.splice(i,1);
        };

        inv.appendChild(s);
    });
}

// update
function update(){

moving=false;

if(keys["w"]){player.y-=player.speed; moving=true;}
if(keys["s"]){player.y+=player.speed; moving=true;}
if(keys["a"]){player.x-=player.speed; moving=true;}
if(keys["d"]){player.x+=player.speed; moving=true;}

if(moving) animFrame+=0.3;
else animFrame=0;

// zonas
let dxs=player.x-safeZone.x;
let dys=player.y-safeZone.y;
let inSafe=Math.sqrt(dxs*dxs+dys*dys)<safeZone.r;

let dxd=player.x-dangerZone.x;
let dyd=player.y-dangerZone.y;
let inDanger=Math.sqrt(dxd*dxd+dyd*dyd)<dangerZone.r;

// enemigos
enemies.forEach(e=>{
    let dx=player.x-e.x;
    let dy=player.y-e.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<200){
        let ang=Math.atan2(dy,dx);
        e.x+=Math.cos(ang)*1.5;
        e.y+=Math.sin(ang)*1.5;
    }

    if(dist<30 && e.cooldown<=0 && !inSafe){
        let dmg = inDanger ? 10 : 5;
        player.hp-=dmg;
        e.cooldown=30;
    }

    if(e.cooldown>0) e.cooldown--;
});

// muerte
if(player.hp<=0){
    player.hp=player.maxHp;
    player.x=1000;
    player.y=1000;
}

// UI stats
document.getElementById("stats").innerText =
"HP: "+player.hp+"\nArma: "+player.weapon;

}

// draw
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// fondo
ctx.fillStyle="#2e8b57";
ctx.fillRect(0,0,canvas.width,canvas.height);

// zonas
ctx.fillStyle="rgba(0,255,0,0.2)";
ctx.beginPath();
ctx.arc(safeZone.x-player.x+300,safeZone.y-player.y+200,safeZone.r,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="rgba(255,0,0,0.2)";
ctx.beginPath();
ctx.arc(dangerZone.x-player.x+300,dangerZone.y-player.y+200,dangerZone.r,0,Math.PI*2);
ctx.fill();

// enemigos
enemies.forEach(e=>{
    ctx.fillStyle="purple";
    ctx.fillRect(e.x-player.x+300,e.y-player.y+200,20,20);
});

// 🧍 jugador con cabeza
let offset=Math.sin(animFrame)*5;

// cuerpo
ctx.fillStyle="blue";
ctx.fillRect(300,200+offset,20,20);

// cabeza
ctx.fillStyle="#ffcc99";
ctx.fillRect(305,190+offset,10,10);

// piernas
ctx.fillRect(302,220+Math.sin(animFrame)*5,5,10);
ctx.fillRect(312,220-Math.sin(animFrame)*5,5,10);

// barra vida
ctx.fillStyle="red";
ctx.fillRect(20,20,200,10);
ctx.fillStyle="lime";
ctx.fillRect(20,20,(player.hp/player.maxHp)*200,10);

// info
document.getElementById("info").innerText =
"HP: "+player.hp+" | Inventario: "+player.inventory.length;

}

// loop
function loop(){
update();
draw();
drawInventory();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
