<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG PRO ULTRA</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:20px; }

#inventory {
position: fixed;
bottom: 10px;
left: 50%;
transform: translateX(-50%);
display: grid;
grid-template-columns: repeat(8, 50px);
gap: 5px;
}

.slot {
width: 50px;
height: 50px;
background: #222;
border: 2px solid #555;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:12px;
cursor:pointer;
}

#stats {
position: fixed;
right: 10px;
top: 50px;
background:#111;
border:2px solid #777;
padding:10px;
display:none;
}

#minimap {
position: fixed;
top: 10px;
right: 10px;
background:black;
border:2px solid white;
}
</style>
</head>

<body>

<h2>🌍 RPG PRO ULTRA</h2>
<p id="info"></p>

<canvas id="game" width="600" height="400"></canvas>
<canvas id="minimap" width="150" height="150"></canvas>

<div id="inventory"></div>
<div id="stats"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const mini = document.getElementById("minimap");
const mtx = mini.getContext("2d");

// jugador
let player = {
x:1000,y:1000,
hp:100,maxHp:100,
mana:100,maxMana:100,
kills:0,
inventory:{}
};

// animación
let keys={}, moving=false, anim=0;
let attack=false, skillQ=false, skillE=false, attackAnim=0;

// clases
function getClass(){
if(player.kills>40) return "oscuro";
if(player.kills>20) return "mago";
return "paladin";
}

// zonas
const cities=[{x:1000,y:1000,r:200},{x:400,y:400,r:150}];
const dangerZone={x:1600,y:1600,r:600};

// lago grande
const lake={x:1500,y:0,w:500,h:800};

// objetos
let trees=[],rocks=[],npcs=[],enemies=[],bullets=[];

// generar mundo
for(let i=0;i<100;i++) trees.push({x:Math.random()*2000,y:Math.random()*2000});
for(let i=0;i<70;i++) rocks.push({x:Math.random()*2000,y:Math.random()*2000});

// npc en ciudades
cities.forEach(c=>{
for(let i=0;i<5;i++){
npcs.push({
x:c.x+(Math.random()-0.5)*100,
y:c.y+(Math.random()-0.5)*100
});
}
});

// enemigos
for(let i=0;i<60;i++){
enemies.push({
x:Math.random()*2000,
y:Math.random()*2000,
hp:50
});
}

// controles
document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key===" ") {attack=true; attackAnim=10;}
if(e.key==="q") skillQ=true;
if(e.key==="e") skillE=true;

if(e.key==="p"){
let s=document.getElementById("stats");
s.style.display=s.style.display==="none"?"block":"none";
}
});

document.addEventListener("keyup",e=>keys[e.key]=false);

// inventario
function addItem(item){
player.inventory[item]=(player.inventory[item]||0)+1;
}

function drawInventory(){
let inv=document.getElementById("inventory");
inv.innerHTML="";
Object.keys(player.inventory).forEach(item=>{
let d=document.createElement("div");
d.className="slot";
d.innerHTML=item+"<br>x"+player.inventory[item];

d.onclick=()=>{
player.inventory[item]--;
if(player.inventory[item]<=0) delete player.inventory[item];

if(item==="🧪"){
player.hp=Math.min(player.hp+20,player.maxHp);
}
};

inv.appendChild(d);
});
}

// update
function update(){

moving=false;

let nx=player.x, ny=player.y;

if(keys["w"]){ny-=4; moving=true;}
if(keys["s"]){ny+=4; moving=true;}
if(keys["a"]){nx-=4; moving=true;}
if(keys["d"]){nx+=4; moving=true;}

// lago bloquea
if(!(nx>lake.x && nx<lake.x+lake.w && ny>lake.y && ny<lake.y+lake.h)){
player.x=nx; player.y=ny;
}

// animación caminar
if(moving) anim+=0.3;

// enemigos
enemies.forEach(e=>{
let dx=player.x-e.x;
let dy=player.y-e.y;
let dist=Math.hypot(dx,dy);

if(dist<200){
e.x+=dx/dist;
e.y+=dy/dist;
}

if(dist<30){
player.hp-=0.2;
}
});

// combate
if(attack){
enemies.forEach(e=>{
if(Math.hypot(e.x-player.x,e.y-player.y)<60){
e.hp-=10;
}
});
attack=false;
}

if(skillQ && player.mana>10){
bullets.push({x:player.x,y:player.y,vx:5,vy:0});
player.mana-=10;
skillQ=false;
}

if(skillE){
enemies.forEach(e=>{
if(Math.hypot(e.x-player.x,e.y-player.y)<120){
e.hp-=8;
}
});
skillE=false;
}

// balas
bullets.forEach(b=>{
b.x+=b.vx;
enemies.forEach(e=>{
if(Math.hypot(e.x-b.x,e.y-b.y)<20){
e.hp-=15;
b.hit=true;
}
});
});
bullets=bullets.filter(b=>!b.hit);

// muerte enemigos
enemies=enemies.filter(e=>{
if(e.hp<=0){
player.kills++;
if(Math.random()<0.5) addItem("💎");
return false;
}
return true;
});

// mana regen
player.mana=Math.min(player.mana+0.1,player.maxMana);

if(attackAnim>0) attackAnim--;
}

// draw
function draw(){

ctx.clearRect(0,0,600,400);

// fondo
ctx.fillStyle="#2e8b57";
ctx.fillRect(0,0,600,400);

// lago
ctx.fillStyle="blue";
ctx.fillRect(lake.x-player.x+300,lake.y-player.y+200,lake.w,lake.h);

// ciudades
cities.forEach(c=>{
ctx.strokeStyle="white";
ctx.strokeRect(c.x-player.x+300-100,c.y-player.y+200-100,200,200);
});

// npc
npcs.forEach(n=>{
ctx.fillStyle="green";
ctx.fillRect(n.x-player.x+300,n.y-player.y+200,10,10);
});

// enemigos
enemies.forEach(e=>{
ctx.fillStyle="purple";
ctx.fillRect(e.x-player.x+300,e.y-player.y+200,20,20);

// HP
ctx.fillStyle="red";
ctx.fillRect(e.x-player.x+300,e.y-player.y+190,20,3);
ctx.fillStyle="lime";
ctx.fillRect(e.x-player.x+300,e.y-player.y+190,(e.hp/50)*20,3);
});

// proyectiles
ctx.fillStyle="yellow";
bullets.forEach(b=>{
ctx.fillRect(b.x-player.x+300,b.y-player.y+200,5,5);
});

// jugador animado
let offset=Math.sin(anim)*5;

ctx.fillStyle="cyan";
ctx.fillRect(300,200+offset,20,20);

// cabeza
ctx.fillStyle="#ffcc99";
ctx.fillRect(305,190+offset,10,10);

// piernas
ctx.fillStyle="white";
ctx.fillRect(302,220+Math.sin(anim)*5,5,10);
ctx.fillRect(312,220-Math.sin(anim)*5,5,10);

// ataque animación
if(attackAnim>0){
ctx.strokeStyle="yellow";
ctx.beginPath();
ctx.arc(310,210,attackAnim*2,0,Math.PI*2);
ctx.stroke();
}

// barras
ctx.fillStyle="red";
ctx.fillRect(20,20,200,10);
ctx.fillStyle="lime";
ctx.fillRect(20,20,(player.hp/player.maxHp)*200,10);

ctx.fillStyle="blue";
ctx.fillRect(20,40,200,10);
ctx.fillStyle="cyan";
ctx.fillRect(20,40,(player.mana/player.maxMana)*200,10);

// info
document.getElementById("info").innerText =
"Clase:"+getClass()+" | Kills:"+player.kills;
}

// minimapa
function drawMini(){
mtx.clearRect(0,0,150,150);

mtx.fillStyle="black";
mtx.fillRect(0,0,150,150);

// jugador
mtx.fillStyle="blue";
mtx.fillRect(75,75,4,4);

// npc
mtx.fillStyle="green";
npcs.forEach(n=>{
mtx.fillRect(n.x/2000*150,n.y/2000*150,3,3);
});

// enemigos
mtx.fillStyle="red";
enemies.forEach(e=>{
mtx.fillRect(e.x/2000*150,e.y/2000*150,2,2);
});
}

// stats
function drawStats(){
document.getElementById("stats").innerHTML=
"HP:"+player.hp+"<br>Mana:"+player.mana+"<br>Kills:"+player.kills+"<br>Clase:"+getClass();
}

// loop
function loop(){
update();
draw();
drawMini();
drawInventory();
drawStats();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
