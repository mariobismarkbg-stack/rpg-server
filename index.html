<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG PRO</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:10px; }

#inventory {
position:fixed; bottom:10px; left:50%;
transform:translateX(-50%);
display:grid; grid-template-columns:repeat(8,50px);
gap:5px;
}

.slot {
width:50px;height:50px;background:#222;
border:1px solid #555;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
font-size:12px;cursor:pointer;
}

#minimap { position:fixed; top:10px; right:10px; border:2px solid white; }
</style>
</head>

<body>

<h2>🌍 RPG PRO</h2>

<canvas id="game" width="800" height="500"></canvas>
<canvas id="minimap" width="150" height="150"></canvas>

<div id="inventory"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const MAP = 4000;

// jugador
let player = {
x:2000,y:2000,
hp:100,maxHp:100,
inv:{},
anim:0
};

// árboles (bloquean)
let trees=[];
for(let i=0;i<200;i++){
trees.push({x:Math.random()*MAP,y:Math.random()*MAP,hp:30});
}

// rocas (bloquean fuerte)
let rocks=[];
for(let i=0;i<100;i++){
rocks.push({x:Math.random()*MAP,y:Math.random()*MAP});
}

// lago grande + pequeños
let lakes=[
{x:3000,y:0,w:800,h:800},
{x:500,y:2000,w:200,h:200}
];

// ciudad
let cities=[
{x:800,y:800,r:300}
];

// enemigos
let enemies=[];
for(let i=0;i<50;i++){
enemies.push({x:Math.random()*MAP,y:Math.random()*MAP,hp:50});
}

// controles
let keys={},attack=false;

document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key===" ") attack=true;
});

document.addEventListener("keyup",e=>keys[e.key]=false);

// colisión
function collide(x,y){
for(let t of trees){
if(Math.hypot(x-t.x,y-t.y)<20) return true;
}
for(let r of rocks){
if(Math.hypot(x-r.x,y-r.y)<40) return true;
}
for(let l of lakes){
if(x>l.x && x<l.x+l.w && y>l.y && y<l.y+l.h) return true;
}
return false;
}

// update
function update(){

let nx=player.x,ny=player.y;

// movimiento (FIX REAL)
if(keys["w"]) ny-=4;
if(keys["s"]) ny+=4;
if(keys["a"]) nx-=4;
if(keys["d"]) nx+=4;

if(!collide(nx,ny)){
player.x=nx;
player.y=ny;
player.anim+=0.3;
}

// enemigos persiguen
enemies.forEach(e=>{
let dx=player.x-e.x;
let dy=player.y-e.y;
let d=Math.hypot(dx,dy);

if(d<200){
e.x+=dx/d;
e.y+=dy/d;
}

// daño
if(d<25){
player.hp-=0.1;
}
});

// ataque
if(attack){
enemies.forEach(e=>{
if(Math.hypot(e.x-player.x,e.y-player.y)<60){
e.hp-=10;
}
});
attack=false;
}

// drops
enemies=enemies.filter(e=>{
if(e.hp<=0){
player.inv["💎"]=(player.inv["💎"]||0)+1;
return false;
}
return true;
});
}

// dibujar personaje (con piernas)
function drawPlayer(x,y,color){

let offset=Math.sin(player.anim)*4;

ctx.fillStyle=color;

// cuerpo
ctx.fillRect(x,y+offset,20,20);

// cabeza
ctx.fillStyle="#ffcc99";
ctx.fillRect(x+5,y-10+offset,10,10);

// piernas
ctx.fillStyle="white";
ctx.fillRect(x+3,y+20+Math.sin(player.anim)*4,4,8);
ctx.fillRect(x+13,y+20-Math.sin(player.anim)*4,4,8);
}

// draw
function draw(){

ctx.clearRect(0,0,800,500);

// fondo
ctx.fillStyle="#2e8b57";
ctx.fillRect(0,0,800,500);

// ciudad
cities.forEach(c=>{
ctx.fillStyle="rgba(0,255,255,0.3)";
ctx.beginPath();
ctx.arc(c.x-player.x+400,c.y-player.y+250,c.r,0,Math.PI*2);
ctx.fill();

// muralla
ctx.strokeStyle="#555";
ctx.strokeRect(
c.x-player.x+400-c.r/2,
c.y-player.y+250-c.r/2,
c.r,c.r
);
});

// lagos
lakes.forEach(l=>{
ctx.fillStyle="blue";
ctx.fillRect(l.x-player.x+400,l.y-player.y+250,l.w,l.h);
});

// rocas
rocks.forEach(r=>{
ctx.fillStyle="gray";
ctx.beginPath();
ctx.arc(r.x-player.x+400,r.y-player.y+250,30,0,Math.PI*2);
ctx.fill();
});

// árboles
trees.forEach(t=>{
ctx.fillStyle="green";
ctx.fillRect(t.x-player.x+400,t.y-player.y+250,15,15);
});

// enemigos
enemies.forEach(e=>{
drawPlayer(e.x-player.x+400,e.y-player.y+250,"purple");

// barra HP
ctx.fillStyle="red";
ctx.fillRect(e.x-player.x+400,e.y-player.y+240,20,3);

ctx.fillStyle="lime";
ctx.fillRect(e.x-player.x+400,e.y-player.y+240,(e.hp/50)*20,3);
});

// jugador
drawPlayer(400,250,"cyan");

// HP jugador
ctx.fillStyle="red";
ctx.fillRect(20,20,200,10);
ctx.fillStyle="lime";
ctx.fillRect(20,20,(player.hp/player.maxHp)*200,10);
}

// inventario
function drawInventory(){
inventory.innerHTML="";
for(let it in player.inv){
let d=document.createElement("div");
d.className="slot";
d.innerHTML=it+" x"+player.inv[it];
inventory.appendChild(d);
}
}

// loop
function loop(){
update();
draw();
drawInventory();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
