<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG Online PRO</title>
<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:20px; }
</style>
</head>
<body>

<h1>🌍 RPG Online PRO</h1>
<p id="status">Conectando...</p>
<p id="info"></p>

<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let ws;
let players = {};

function conectar() {
    ws = new WebSocket("wss://rpg-server-01lz.onrender.com/");

    ws.onopen = () => {
        document.getElementById("status").innerText = "🟢 Conectado";
    };

    ws.onclose = () => {
        document.getElementById("status").innerText = "Reconectando...";
        setTimeout(conectar, 2000);
    };

    ws.onmessage = (e) => {
        try {
            players = JSON.parse(e.data);
        } catch {}
    };
}

conectar();

// jugador
let player = {
    x: 1000,
    y: 1000,
    speed: 4,
    hp: 100,
    class: "guerrero",
    inventory: []
};

let attack = false;

// enemigos
let enemies = [
    { x: 900, y: 900, hp: 50 },
    { x: 1100, y: 1100, hp: 50 }
];

// cámara
let camera = { x: 0, y: 0 };

// controles
let keys = {};
document.addEventListener("keydown", (e) => {
    keys[e.key] = true;

    if (e.key === " ") attack = true;
    if (e.key === "1") player.class = "guerrero";
    if (e.key === "2") player.class = "mago";
});

document.addEventListener("keyup", (e) => {
    keys[e.key] = false;
});

// update
function update() {
    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;

    // ataque a enemigos
    if (attack) {
        enemies.forEach(e => {
            let dx = e.x - player.x;
            let dy = e.y - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 60) {
                let dmg = player.class === "mago" ? 15 : 10;
                e.hp -= dmg;

                if (e.hp <= 0) {
                    e.hp = 50;
                    e.x = Math.random()*2000;
                    e.y = Math.random()*2000;
                    player.inventory.push("loot");
                }
            }
        });
    }

    // enviar server
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            x: player.x,
            y: player.y,
            attack: attack
        }));
    }

    attack = false;

    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;
}

// draw
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#2e8b57";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // enemigos
    enemies.forEach(e => {
        ctx.fillStyle = "purple";
        ctx.fillRect(e.x - camera.x, e.y - camera.y, 20, 20);

        ctx.fillStyle = "red";
        ctx.fillRect(e.x - camera.x, e.y - camera.y - 10, e.hp, 3);
    });

    // otros jugadores
    for (let id in players) {
        let p = players[id];
        if (!p) continue;

        ctx.fillStyle = "red";
        ctx.fillRect(p.x - camera.x, p.y - camera.y, 20, 30);
    }

    // jugador
    ctx.fillStyle = player.class === "mago" ? "cyan" : "blue";
    ctx.fillRect(player.x - camera.x, player.y - camera.y, 20, 30);

    // UI
    document.getElementById("info").innerText =
        "Clase: " + player.class +
        " | Vida: " + player.hp +
        " | Inventario: " + player.inventory.length;
}

// loop
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
