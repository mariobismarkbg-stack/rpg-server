<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG PRO MAX</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:20px; }

#inventory {
position: fixed;
bottom: 10px;
left: 50%;
transform: translateX(-50%);
display: grid;
grid-template-columns: repeat(5, 50px);
gap: 5px;
}

.slot {
width: 50px;
height: 50px;
background: #222;
border: 2px solid #555;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}
</style>
</head>

<body>

<h2>🌍 RPG PRO MAX</h2>
<p id="info"></p>

<canvas id="game" width="600" height="400"></canvas>
<div id="inventory"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// jugador
let player = {
x:1000,y:1000,
hp:100,maxHp:100,
class:"neutral",
inventory:["🧪"],
kills:0
};

// clases
function getClass(){
if(player.kills > 30) return "paladin";
if(player.kills > 10) return "mago";
return "neutral";
}

// zonas
const safeZones = [
{x:1000,y:1000,r:250},
{x:400,y:400,r:200}
];

const dangerZone = {x:1600,y:1600,r:500};

// enemigos
let enemies=[];
function spawnEnemy(x,y){
enemies.push({
x,y,hp:50,maxHp:50,
type:"normal"
});
}

// spawn general
for(let i=0;i<20;i++){
spawnEnemy(Math.random()*2000,Math.random()*2000);
}

// proyectiles
let bullets=[];

// boss
let boss=null;

// controles
let keys={}, attack=false, skillQ=false, skillE=false;

document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key===" ") attack=true;
if(e.key==="q") skillQ=true;
if(e.key==="e") skillE=true;
});

document.addEventListener("keyup",e=>keys[e.key]=false);

// movimiento
function move(){
if(keys["w"]) player.y-=4;
if(keys["s"]) player.y+=4;
if(keys["a"]) player.x-=4;
if(keys["d"]) player.x+=4;
}

// enemigos IA
function updateEnemies(){
enemies.forEach(e=>{
let dx=player.x-e.x;
let dy=player.y-e.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<200){
e.x+=dx/dist;
e.y+=dy/dist;
}

// daño
if(dist<25){
if(!inSafeZone()){
player.hp-=0.2;
}
}
});
}

// safe
function inSafeZone(){
return safeZones.some(z=>{
let dx=player.x-z.x;
let dy=player.y-z.y;
return Math.sqrt(dx*dx+dy*dy)<z.r;
});
}

// combate
function combat(){

// básico
if(attack){
enemies.forEach(e=>{
if(dist(player,e)<60){
e.hp-=10;
}
});
}

// habilidad
if(skillQ){
if(getClass()==="mago"){
bullets.push({
x:player.x,y:player.y,
vx:5,vy:0, dmg:15
});
}
if(getClass()==="paladin"){
player.hp=Math.min(player.hp+10,player.maxHp);
}
}

// secundaria
if(skillE){
enemies.forEach(e=>{
if(dist(player,e)<120){
e.hp-=8;
}
});
}

// daño enemigos
enemies=enemies.filter(e=>{
if(e.hp<=0){
player.kills++;
if(Math.random()<0.5) player.inventory.push("💎");
return false;
}
return true;
});

// boss
if(player.kills>0 && player.kills%50===0 && !boss){
boss={x:1500,y:1500,hp:300,maxHp:300};
}
}

// proyectiles
function updateBullets(){
bullets.forEach(b=>{
b.x+=b.vx;
b.y+=b.vy;

enemies.forEach(e=>{
if(dist(b,e)<20){
e.hp-=b.dmg;
b.hit=true;
}
});
});
bullets=bullets.filter(b=>!b.hit);
}

// distancia
function dist(a,b){
let dx=a.x-b.x;
let dy=a.y-b.y;
return Math.sqrt(dx*dx+dy*dy);
}

// draw
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// zonas seguras
safeZones.forEach(z=>{
ctx.fillStyle="rgba(0,255,0,0.2)";
ctx.beginPath();
ctx.arc(z.x-player.x+300,z.y-player.y+200,z.r,0,Math.PI*2);
ctx.fill();
});

// enemigos
enemies.forEach(e=>{
ctx.fillStyle="purple";
ctx.fillRect(e.x-player.x+300,e.y-player.y+200,20,20);

// barra HP
ctx.fillStyle="red";
ctx.fillRect(e.x-player.x+300,e.y-player.y+190,20,3);
ctx.fillStyle="lime";
ctx.fillRect(e.x-player.x+300,e.y-player.y+190,(e.hp/e.maxHp)*20,3);
});

// boss
if(boss){
ctx.fillStyle="black";
ctx.fillRect(boss.x-player.x+300,boss.y-player.y+200,40,40);

// HP boss
ctx.fillStyle="red";
ctx.fillRect(200,10,200,10);
ctx.fillStyle="lime";
ctx.fillRect(200,10,(boss.hp/boss.maxHp)*200,10);
}

// jugador
ctx.fillStyle="cyan";
ctx.fillRect(300,200,20,20);

// proyectiles
ctx.fillStyle="yellow";
bullets.forEach(b=>{
ctx.fillRect(b.x-player.x+300,b.y-player.y+200,5,5);
});

// UI
document.getElementById("info").innerText =
"HP:"+player.hp+" | Kills:"+player.kills+" | Clase:"+getClass();
}

// inventario
function drawInventory(){
let inv=document.getElementById("inventory");
inv.innerHTML="";
player.inventory.forEach((i)=>{
let d=document.createElement("div");
d.className="slot";
d.innerText=i;
inv.appendChild(d);
});
}

// loop
function loop(){
move();
updateEnemies();
combat();
updateBullets();
draw();
drawInventory();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
