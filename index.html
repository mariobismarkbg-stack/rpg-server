<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>My World PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{margin:0;overflow:hidden;background:#0a0a0f}
canvas{display:block}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();addEventListener("resize",resize);

let player={x:400,y:300,dir:0,hp:100,mana:100};
let keys={};
let particles=[];

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function spawnParticles(x,y,color,count){
 for(let i=0;i<count;i++){
  particles.push({x,y,dx:(Math.random()-.5)*6,dy:(Math.random()-.5)*6,life:30+Math.random()*30,size:Math.random()*4+1,color});
 }
}

function castSkill(){
 if(player.mana<10)return;
 player.mana-=10;
 spawnParticles(player.x,player.y,"#ff6600",20);
}

function drawPlayer(x,y){
 ctx.fillStyle='rgba(0,0,0,0.4)';
 ctx.beginPath();ctx.arc(x,y+10,8,0,Math.PI*2);ctx.fill();
 let g=ctx.createRadialGradient(x,y,2,x,y,10);
 g.addColorStop(0,'#fff');g.addColorStop(1,'#3498db');
 ctx.fillStyle=g;
 ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();
}

function drawTree(x,y){
 ctx.fillStyle='rgba(0,0,0,0.3)';
 ctx.beginPath();ctx.ellipse(x,y+10,10,5,0,0,Math.PI*2);ctx.fill();
 ctx.fillStyle='#5a3a1a';ctx.fillRect(x-2,y,4,10);
 let g=ctx.createRadialGradient(x,y,2,x,y,12);
 g.addColorStop(0,'#4caf50');g.addColorStop(1,'#1b5e20');
 ctx.fillStyle=g;
 ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.fill();
}

let trees=Array.from({length:30},()=>({x:Math.random()*2000,y:Math.random()*2000}));

function update(){
 let speed=3;
 if(keys['w'])player.y-=speed;
 if(keys['s'])player.y+=speed;
 if(keys['a'])player.x-=speed;
 if(keys['d'])player.x+=speed;
 if(keys[' '])castSkill();

 particles.forEach(p=>{p.x+=p.dx;p.y+=p.dy;p.life--});
 particles=particles.filter(p=>p.life>0);
}

function draw(){
 const W=canvas.width,H=canvas.height;
 ctx.clearRect(0,0,W,H);

 // fondo
 ctx.fillStyle="#7aaa4a";
 ctx.fillRect(0,0,W,H);

 // sombras globales
 ctx.shadowColor='rgba(0,0,0,0.5)';
 ctx.shadowBlur=10;
 ctx.shadowOffsetX=2;
 ctx.shadowOffsetY=4;

 trees.forEach(t=>drawTree(t.x,t.y));
 drawPlayer(player.x,player.y);

 ctx.shadowBlur=0;

 // partículas
 particles.forEach(p=>{
  ctx.globalAlpha=p.life/60;
  ctx.fillStyle=p.color;
  ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
 });
 ctx.globalAlpha=1;
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
