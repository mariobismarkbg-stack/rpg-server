<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG Online PRO</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:20px; }

/* INVENTARIO */
#inventory {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: grid;
    grid-template-columns: repeat(5, 50px);
    gap: 5px;
}

.slot {
    width: 50px;
    height: 50px;
    background: #222;
    border: 2px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-direction: column;
}

/* HABILIDADES */
#skills {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
}

.skill {
    width: 60px;
    height: 60px;
    background: #111;
    border: 2px solid #777;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-size: 12px;
}
</style>
</head>

<body>

<h1>🌍 RPG Online PRO</h1>
<p id="status">Conectando...</p>
<p id="info"></p>

<canvas id="game" width="600" height="400"></canvas>

<div id="skills">
    <div class="skill">Q<br>⚡</div>
    <div class="skill">E<br>💥</div>
</div>

<div id="inventory"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// jugador
let player = { x: 1000, y: 1000, speed: 4, inventory: [] };

// animaciones
let animFrame = 0;
let moving = false;
let attack = false;
let skillQ = false;
let skillE = false;

// mundo
let trees = [];
let rocks = [];
let waterZones = [];

// 🌲 bosque GRANDE
for (let i = 0; i < 120; i++) {
    trees.push({ x: Math.random()*2000, y: Math.random()*2000, hp: 30, cut:false });
}

// 🪨 rocas
for (let i = 0; i < 80; i++) {
    rocks.push({ x: Math.random()*2000, y: Math.random()*2000 });
}

// 🌊 agua GRANDE
for (let i = 0; i < 5; i++) {
    waterZones.push({
        x: Math.random()*1600,
        y: Math.random()*1600,
        w: 400,
        h: 400,
        deep: Math.random() > 0.5
    });
}

// enemigos
let enemies = [];
for (let i = 0; i < 12; i++) {
    enemies.push({
        x: Math.random()*2000,
        y: Math.random()*2000,
        hp: 50,
        dirX: (Math.random()-0.5)*2,
        dirY: (Math.random()-0.5)*2
    });
}

// cámara
let camera = { x: 0, y: 0 };

// controles
let keys = {};
document.addEventListener("keydown", e => {
    keys[e.key] = true;

    if (e.key === " ") attack = true;
    if (e.key === "q") skillQ = true;
    if (e.key === "e") skillE = true;
});
document.addEventListener("keyup", e => keys[e.key] = false);

// colisión
function collide(x,y,ox,oy,size){
    return x<ox+size && x+20>ox && y<oy+size && y+20>oy;
}

// update
function update(){

    let newX = player.x;
    let newY = player.y;
    moving = false;

    if(keys["w"]){ newY -= player.speed; moving=true; }
    if(keys["s"]){ newY += player.speed; moving=true; }
    if(keys["a"]){ newX -= player.speed; moving=true; }
    if(keys["d"]){ newX += player.speed; moving=true; }

    let blocked=false;

    // árboles
    trees.forEach(t=>{
        if(!t.cut && collide(newX,newY,t.x,t.y,30)) blocked=true;
    });

    // rocas
    rocks.forEach(r=>{
        if(collide(newX,newY,r.x,r.y,25)) blocked=true;
    });

    // agua profunda
    waterZones.forEach(w=>{
        if(w.deep &&
            newX < w.x + w.w &&
            newX + 20 > w.x &&
            newY < w.y + w.h &&
            newY + 20 > w.y
        ){
            blocked=true;
        }
    });

    if(!blocked){
        player.x=newX;
        player.y=newY;
    }

    if(moving) animFrame+=0.2; else animFrame=0;

    // enemigos se mueven
    enemies.forEach(e=>{
        e.x+=e.dirX;
        e.y+=e.dirY;

        if(Math.random()<0.02){
            e.dirX=(Math.random()-0.5)*2;
            e.dirY=(Math.random()-0.5)*2;
        }
    });

    // ATAQUES
    if(attack || skillQ || skillE){

        enemies.forEach(e=>{
            let dx=e.x-player.x;
            let dy=e.y-player.y;
            let dist=Math.sqrt(dx*dx+dy*dy);

            let range=60;
            let dmg=10;

            if(skillQ){ range=100; dmg=20; }
            if(skillE){ range=150; dmg=8; }

            if(dist<range){
                e.hp-=dmg;

                if(e.hp<=0){
                    e.hp=50;
                    e.x=Math.random()*2000;
                    e.y=Math.random()*2000;

                    const drops=["🪵","🪨","💎","🧪"];
                    player.inventory.push(drops[Math.floor(Math.random()*4)]);
                }
            }
        });

        // árboles
        trees.forEach(t=>{
            if(!t.cut){
                let dx=t.x-player.x;
                let dy=t.y-player.y;
                let dist=Math.sqrt(dx*dx+dy*dy);

                if(dist<60){
                    t.hp-=10;
                    if(t.hp<=0){
                        t.cut=true;
                        player.inventory.push("🪵");
                    }
                }
            }
        });
    }

    attack=false;
    skillQ=false;
    skillE=false;

    camera.x = player.x - canvas.width/2;
    camera.y = player.y - canvas.height/2;
}

// inventario
function drawInventory(){
    const inv=document.getElementById("inventory");
    inv.innerHTML="";
    let counts={};

    player.inventory.forEach(i=>counts[i]=(counts[i]||0)+1);
    let items=Object.keys(counts);

    for(let i=0;i<10;i++){
        let s=document.createElement("div");
        s.className="slot";

        if(items[i]){
            s.innerHTML=`${items[i]}<br>x${counts[items[i]]}`;
        }

        inv.appendChild(s);
    }
}

// draw
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // fondo
    ctx.fillStyle="#2e8b57";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // agua
    waterZones.forEach(w=>{
        ctx.fillStyle = w.deep ? "rgba(0,0,150,0.7)" : "rgba(0,150,255,0.5)";
        ctx.fillRect(w.x-camera.x, w.y-camera.y, w.w, w.h);
    });

    // bosque
    trees.forEach(t=>{
        if(!t.cut){
            ctx.fillStyle="darkgreen";
            ctx.fillRect(t.x-camera.x, t.y-camera.y, 30,30);
        } else {
            ctx.fillStyle="brown";
            ctx.fillRect(t.x-camera.x, t.y-camera.y, 20,10);
        }
    });

    // rocas
    rocks.forEach(r=>{
        ctx.fillStyle="gray";
        ctx.fillRect(r.x-camera.x, r.y-camera.y, 25,25);
    });

    // enemigos
    enemies.forEach(e=>{
        ctx.fillStyle="purple";
        ctx.fillRect(e.x-camera.x, e.y-camera.y, 20,20);

        ctx.fillStyle="red";
        ctx.fillRect(e.x-camera.x, e.y-camera.y-8, e.hp, 4);
    });

    // jugador
    let offset=Math.sin(animFrame)*5;

    ctx.fillStyle="blue";
    ctx.fillRect(player.x-camera.x, player.y-camera.y+offset, 20,20);

    // UI
    document.getElementById("info").innerText =
        "Inventario: "+player.inventory.length;
}

// loop
function loop(){
    update();
    draw();
    drawInventory();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
