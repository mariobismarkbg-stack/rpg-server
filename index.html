<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG PRO FIXED</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:20px; }

#inventory {
position: fixed;
bottom: 10px;
left: 50%;
transform: translateX(-50%);
display: grid;
grid-template-columns: repeat(5, 50px);
gap: 5px;
}

.slot {
width: 50px;
height: 50px;
background: #222;
border: 2px solid #555;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#map {
position: fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
border:2px solid white;
display:none;
}
</style>
</head>

<body>

<h2>🌍 RPG PRO FIXED</h2>
<p id="info"></p>

<canvas id="game" width="600" height="400"></canvas>
<canvas id="map" width="300" height="300"></canvas>

<div id="inventory"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const mapCanvas = document.getElementById("map");
const mapCtx = mapCanvas.getContext("2d");

// jugador
let player = { x:1000,y:1000,hp:100,maxHp:100,inventory:["🧪"] };

let keys={}, attack=false, attackAnim=0;

// zonas
const safeZones = [
{x:1000,y:1000,r:250},
{x:400,y:400,r:200}
];

const dangerZone = {x:1600,y:1600,r:500};

// árboles / rocas
let trees=[], rocks=[];

for(let i=0;i<80;i++){
trees.push({x:Math.random()*2000,y:Math.random()*2000});
}

for(let i=0;i<50;i++){
rocks.push({x:Math.random()*2000,y:Math.random()*2000});
}

// agua
let water=[], deepWater=[];
for(let i=0;i<3;i++){
let x=Math.random()*1500;
let y=Math.random()*1500;
water.push({x,y,w:300,h:300});
deepWater.push({x:x+50,y:y+50,w:200,h:200});
}

// enemigos
let enemies=[];
for(let i=0;i<25;i++){
enemies.push({x:Math.random()*2000,y:Math.random()*2000,hp:50});
}

// npc
let npcs=[
{x:1000,y:950},
{x:420,y:420}
];

// controles
document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key===" ") {attack=true; attackAnim=10;}
if(e.key==="m"){
mapCanvas.style.display =
mapCanvas.style.display==="none"?"block":"none";
}
});

document.addEventListener("keyup",e=>keys[e.key]=false);

// colisión simple
function collide(x,y,obj,size){
return x<obj.x+size && x+20>obj.x && y<obj.y+size && y+20>obj.y;
}

// update
function update(){

let nx=player.x, ny=player.y;

if(keys["w"]) ny-=4;
if(keys["s"]) ny+=4;
if(keys["a"]) nx-=4;
if(keys["d"]) nx+=4;

let blocked=false;

// colisiones
trees.forEach(t=>{ if(collide(nx,ny,t,30)) blocked=true; });
rocks.forEach(r=>{ if(collide(nx,ny,r,25)) blocked=true; });

// agua profunda
deepWater.forEach(w=>{
if(nx>w.x && nx<w.x+w.w && ny>w.y && ny<w.y+w.h) blocked=true;
});

if(!blocked){
player.x=nx;
player.y=ny;
}

// enemigos IA
enemies.forEach(e=>{
let dx=player.x-e.x;
let dy=player.y-e.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<200){
e.x+=dx/dist;
e.y+=dy/dist;
}

// daño
if(dist<25){
player.hp-=0.1;
}
});

// combate
if(attack){
enemies.forEach(e=>{
if(Math.hypot(e.x-player.x,e.y-player.y)<60){
e.hp-=10;
}
});
attack=false;
}

enemies=enemies.filter(e=>e.hp>0);

if(attackAnim>0) attackAnim--;
}

// draw mundo
function draw(){

ctx.clearRect(0,0,600,400);

// fondo
ctx.fillStyle="#2e8b57";
ctx.fillRect(0,0,600,400);

// zonas
safeZones.forEach(z=>{
ctx.fillStyle="rgba(0,255,0,0.2)";
ctx.beginPath();
ctx.arc(z.x-player.x+300,z.y-player.y+200,z.r,0,Math.PI*2);
ctx.fill();
});

ctx.fillStyle="rgba(255,0,0,0.2)";
ctx.beginPath();
ctx.arc(dangerZone.x-player.x+300,dangerZone.y-player.y+200,dangerZone.r,0,Math.PI*2);
ctx.fill();

// agua
water.forEach(w=>{
ctx.fillStyle="lightblue";
ctx.fillRect(w.x-player.x+300,w.y-player.y+200,w.w,w.h);
});
deepWater.forEach(w=>{
ctx.fillStyle="blue";
ctx.fillRect(w.x-player.x+300,w.y-player.y+200,w.w,w.h);
});

// árboles
trees.forEach(t=>{
ctx.fillStyle="green";
ctx.fillRect(t.x-player.x+300,t.y-player.y+200,30,30);
});

// rocas
rocks.forEach(r=>{
ctx.fillStyle="gray";
ctx.fillRect(r.x-player.x+300,r.y-player.y+200,25,25);
});

// npc
npcs.forEach(n=>{
ctx.fillStyle="yellow";
ctx.fillRect(n.x-player.x+300,n.y-player.y+200,20,20);
});

// enemigos
enemies.forEach(e=>{
ctx.fillStyle="purple";
ctx.fillRect(e.x-player.x+300,e.y-player.y+200,20,20);

// HP
ctx.fillStyle="red";
ctx.fillRect(e.x-player.x+300,e.y-player.y+190,20,3);
ctx.fillStyle="lime";
ctx.fillRect(e.x-player.x+300,e.y-player.y+190,(e.hp/50)*20,3);
});

// jugador
ctx.fillStyle="cyan";
ctx.fillRect(300,200,20,20);

// cabeza
ctx.fillStyle="#ffcc99";
ctx.fillRect(305,190,10,10);

// ataque animación
if(attackAnim>0){
ctx.strokeStyle="yellow";
ctx.beginPath();
ctx.arc(310,210,attackAnim*2,0,Math.PI*2);
ctx.stroke();
}

// vida
ctx.fillStyle="red";
ctx.fillRect(20,20,200,10);
ctx.fillStyle="lime";
ctx.fillRect(20,20,(player.hp/player.maxHp)*200,10);

document.getElementById("info").innerText =
"HP:"+Math.floor(player.hp);
}

// mapa
function drawMap(){
mapCtx.clearRect(0,0,300,300);

mapCtx.fillStyle="black";
mapCtx.fillRect(0,0,300,300);

// jugador
mapCtx.fillStyle="cyan";
mapCtx.fillRect(player.x/2000*300,player.y/2000*300,5,5);

// zonas
safeZones.forEach(z=>{
mapCtx.fillStyle="green";
mapCtx.fillRect(z.x/2000*300,z.y/2000*300,5,5);
});

mapCtx.fillStyle="red";
mapCtx.fillRect(dangerZone.x/2000*300,dangerZone.y/2000*300,5,5);
}

// inventario
function drawInventory(){
let inv=document.getElementById("inventory");
inv.innerHTML="";
player.inventory.forEach((it,i)=>{
let d=document.createElement("div");
d.className="slot";
d.innerText=it;
d.onclick=()=>{
if(it==="🧪"){
player.hp=Math.min(player.hp+20,player.maxHp);
player.inventory.splice(i,1);
}
};
inv.appendChild(d);
});
}

// loop
function loop(){
update();
draw();
drawInventory();
drawMap();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
