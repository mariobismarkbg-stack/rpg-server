<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RPG WORLD</title>

<style>
body { background:black; color:white; text-align:center; }
canvas { background:#111; margin-top:20px; }

#minimap { position:fixed; top:10px; right:10px; border:2px solid white; }
#worldmap { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); display:none; border:2px solid white; }

#inventory {
position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
display:grid; grid-template-columns:repeat(8,50px); gap:5px;
}

.slot {
width:50px;height:50px;background:#222;border:1px solid #555;
display:flex;align-items:center;justify-content:center;flex-direction:column;
font-size:12px;cursor:pointer;
}
</style>
</head>

<body>

<h2>🌍 RPG WORLD</h2>

<canvas id="game" width="700" height="450"></canvas>
<canvas id="minimap" width="150" height="150"></canvas>
<canvas id="worldmap" width="400" height="400"></canvas>

<div id="inventory"></div>

<script>
const W=4000,H=4000;
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const mini=document.getElementById("minimap");
const mtx=mini.getContext("2d");

const worldmap=document.getElementById("worldmap");
const wtx=worldmap.getContext("2d");

// jugador
let player={x:2000,y:2000,hp:100,mana:100,karma:0,inv:{}};

// clases
function getClass(){
if(player.karma>20) return "paladin";
if(player.karma<-20) return "oscuro";
return "neutral";
}

// ciudades y pueblos
let cities=[
{x:800,y:800,r:250,type:"city"},
{x:3000,y:700,r:250,type:"city"},
{x:1000,y:3000,r:120,type:"town"},
{x:3200,y:2800,r:120,type:"town"}
];

// zonas peligrosas
let dangerZones=[
{x:2000,y:2000,r:500},
{x:3500,y:1500,r:400}
];

// caminos
let roads=[
{x1:800,y1:800,x2:3000,y2:700},
{x1:800,y1:800,x2:1000,y2:3000}
];

// bosques
let trees=[];
for(let i=0;i<200;i++){
let cx=Math.random()*W, cy=Math.random()*H;
for(let j=0;j<5;j++){
trees.push({x:cx+Math.random()*80,y:cy+Math.random()*80,hp:30});
}
}

// montañas
let mountains=[];
for(let i=0;i<40;i++){
mountains.push({x:Math.random()*W,y:Math.random()*H});
}

// lagos
let lakes=[
{x:3000,y:0,w:800,h:800}, // grande
{x:500,y:2000,w:200,h:200},
{x:2000,y:3500,w:200,h:200}
];

// npc
let npcs=[];
cities.forEach(c=>{
let count=c.type==="city"?15:5;
for(let i=0;i<count;i++){
npcs.push({
x:c.x+(Math.random()-0.5)*c.r,
y:c.y+(Math.random()-0.5)*c.r,
home:c
});
}
});

// enemigos
let enemies=[];
function spawnEnemy(x,y,type){
enemies.push({x,y,hp:type==="boss"?200:type==="elite"?100:50,type});
}

// spawn inicial
for(let i=0;i<80;i++){
spawnEnemy(Math.random()*W,Math.random()*H,"normal");
}

// controles
let keys={},attack=false;
document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key===" ") attack=true;
if(e.key==="m"){
worldmap.style.display=worldmap.style.display==="none"?"block":"none";
}
});
document.addEventListener("keyup",e=>keys[e.key]=false);

// update
function update(){

// movimiento
let nx=player.x, ny=player.y;
if(keys["w"]) ny-=4;
if(keys["s"]) ny+=4;
if(keys["a"]) nx-=4;
if(keys["d"]) nx+=4;

// colisiones montañas
let blocked=false;
mountains.forEach(m=>{
if(Math.hypot(nx-m.x,ny-m.y)<60) blocked=true;
});

// agua profunda
lakes.forEach(l=>{
if(nx>l.x && nx<l.x+l.w && ny>l.y && ny<l.y+l.h){
if(l.w>500) blocked=true; // lago grande bloquea
}
});

if(!blocked){player.x=nx;player.y=ny;}

// npc movimiento
npcs.forEach(n=>{
n.x+=Math.random()-0.5;
n.y+=Math.random()-0.5;
});

// enemigos IA
enemies.forEach(e=>{
let dx=player.x-e.x;
let dy=player.y-e.y;
let dist=Math.hypot(dx,dy);

// no entrar ciudad
let inCity=cities.some(c=>Math.hypot(e.x-c.x,e.y-c.y)<c.r);
if(inCity) return;

if(dist<200){
e.x+=dx/dist;
e.y+=dy/dist;
}

if(dist<30) player.hp-=0.1;
});

// combate
if(attack){
enemies.forEach(e=>{
if(Math.hypot(e.x-player.x,e.y-player.y)<60){
e.hp-=10;
}
});
attack=false;
}

// eliminar muertos
enemies=enemies.filter(e=>e.hp>0);

}

// draw
function draw(){

ctx.clearRect(0,0,700,450);

// fondo
ctx.fillStyle="#2e8b57";
ctx.fillRect(0,0,700,450);

// caminos
ctx.strokeStyle="#c2b280";
roads.forEach(r=>{
ctx.beginPath();
ctx.moveTo(r.x1-player.x+350,r.y1-player.y+225);
ctx.lineTo(r.x2-player.x+350,r.y2-player.y+225);
ctx.stroke();
});

// lagos
lakes.forEach(l=>{
ctx.fillStyle=l.w>500?"darkblue":"lightblue";
ctx.fillRect(l.x-player.x+350,l.y-player.y+225,l.w,l.h);
});

// montañas
mountains.forEach(m=>{
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(m.x-player.x+350,m.y-player.y+225,50,0,Math.PI*2);
ctx.fill();
});

// árboles
trees.forEach(t=>{
ctx.fillStyle="green";
ctx.fillRect(t.x-player.x+350,t.y-player.y+225,20,20);
});

// ciudades
cities.forEach(c=>{
ctx.strokeStyle="white";
ctx.strokeRect(c.x-player.x+350-c.r/2,c.y-player.y+225-c.r/2,c.r,c.r);
});

// npc
npcs.forEach(n=>{
ctx.fillStyle="yellow";
ctx.fillRect(n.x-player.x+350,n.y-player.y+225,10,10);
});

// enemigos
enemies.forEach(e=>{
ctx.fillStyle=e.type==="elite"?"red":e.type==="boss"?"black":"purple";
ctx.fillRect(e.x-player.x+350,e.y-player.y+225,20,20);
});

// jugador
ctx.fillStyle="cyan";
ctx.fillRect(350,225,20,20);

// minimapa
mtx.clearRect(0,0,150,150);
mtx.fillStyle="blue";
mtx.fillRect(75,75,4,4);

// worldmap
wtx.clearRect(0,0,400,400);
wtx.fillStyle="blue";
wtx.fillRect(player.x/W*400,player.y/H*400,5,5);

}

// loop
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
